<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="confirmation.css">
    <link rel="icon" type="image/png" href="/Screenshot_16-removebg-preview.png">
    <title>ParkEasy | Smart Parking Reservations</title>
</head>
<body>
    <div class="main">
        <div class="confirm">✔</div>
        <p class="main1">Reservation Successful</p>
        <p class="main2">Your parking reservation has been confirmed successfully.</p>
        <div class="details">
            <p class="main3">Reservation Details:</p>
            <div class="seperation"><h4 class="main4">Location: </h4> <span id="confirmLocation"></span></div>
            <div class="seperation"><h4 class="main4">Timestamp: </h4> <span id="confirmTimestamp"></span></div>
            <div class="seperation"><h4 class="main4">Name: </h4> <span id="confirmName"></span></div>
            <div class="seperation"><h4 class="main4">V.R.N: </h4> <span id="confirmEmail"></span></div>
            <div class="seperation"><h4 class="main4">Phone: </h4> <span id="confirmPhone"></span></div>
            <div class="seperation"><h4 class="main4">Parking Space: </h4> <span id="confirmLot"></span></div>
            <div class="seperation"><h4 class="main4">Duration: </h4> <span id="confirmDuration"></span></div>
            <div class="seperation"><h4 class="main4">Arrival Time: </h4> <span class="time"><h5 id="confirmStartTime"></h5><h5 id="confirmStartMeridiem"></h5></span></div>
        </div>
        
        
        <p class="main5">Please present this  reservation upon arrival.</p>
        <p class="main6">Thank you for using ParkEasy!</p>
        <a href="index.html" class="btn">Back to Home</a>
        
    </div>
    <script src="confirmation.js"></script>
</body>
</html>
